name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Build frontend ──────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-vite/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend-vite
        run: npm ci

      - name: Build frontend
        working-directory: frontend-vite
        run: npm run build

      # ── Deploy to Droplet via SSH ───────────────────────
      - name: Deploy backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            APP_DIR=/home/${{ secrets.DEPLOY_USER }}/chicken-erp

            # Pull latest code
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            # Backend: install Python deps
            cd "$APP_DIR/backend"
            source venv/bin/activate
            pip install -r requirements.txt --quiet

            # Restart backend service
            sudo systemctl restart chicken-erp-api

            echo "✅ Backend deployed and restarted"

      - name: Upload frontend build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: frontend-vite/build/*
          target: /home/${{ secrets.DEPLOY_USER }}/chicken-erp/frontend-vite
          strip_components: 1
          overwrite: true

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            curl -sf http://localhost:8000/api/health || (echo "❌ Health check failed" && exit 1)
            echo "✅ Deployment verified"
